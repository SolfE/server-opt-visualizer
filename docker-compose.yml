services:
  mysql:
    image: mysql:8.4
    container_name: server-opt-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-server_opt_visualizer}
      MYSQL_USER: ${MYSQL_USER:-server_opt}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-server_opt}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-server_opt} -p${MYSQL_PASSWORD:-server_opt} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: server-opt-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
