spring:
  datasource:
    url: jdbc:h2:mem:serveropt;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

management:
  health:
    redis:
      enabled: false
