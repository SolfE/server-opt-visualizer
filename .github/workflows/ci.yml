name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "chore/**"
      - "feature/**"
      - "fix/**"
      - "perf/**"
      - "refactor/**"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run checks
        run: ./gradlew check
